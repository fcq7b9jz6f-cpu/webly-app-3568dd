<div id="root"><div class="webly-loader">جارٍ تحميل التطبيق...</div></div>

<script>
  // ───── Webly runtime config ─────
  window.__WEBLY__ = {
    projectId: "3568ddc1-3c35-4d89-a5af-b163a35b03bd",
    apiBase: "https://wxphtsgezburjqoqiqqo.supabase.co/functions/v1/webly-app-api/3568ddc1-3c35-4d89-a5af-b163a35b03bd",
    proxyBase: "https://wxphtsgezburjqoqiqqo.supabase.co/functions/v1/webly-proxy/3568ddc1-3c35-4d89-a5af-b163a35b03bd",
  };
  window.__SUPABASE_CONFIG__ = null;

  // ───── Session id for app data ownership ─────
  if (!localStorage.getItem('webly_session')) {
    localStorage.setItem('webly_session', 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36));
  }
  const _sess = localStorage.getItem('webly_session');

  // ───── Single fetch interceptor: rewrite /api/data/* and /api/proxy/* ─────
  (function(){
    const origFetch = window.fetch.bind(window);
    window.fetch = function(input, init){
      try {
        let url = typeof input === 'string' ? input : (input && input.url) || '';
        let newInput = input;
        if (typeof url === 'string') {
          if (url.startsWith('/api/data/')) {
            const newUrl = window.__WEBLY__.apiBase + url.replace(/^\/api\/data/, '');
            newInput = (typeof input === 'string') ? newUrl : new Request(newUrl, input);
          } else if (url.startsWith('/api/proxy/')) {
            const newUrl = window.__WEBLY__.proxyBase + url.replace(/^\/api\/proxy/, '');
            newInput = (typeof input === 'string') ? newUrl : new Request(newUrl, input);
          }
        }
        init = init || {};
        const headers = new Headers(init.headers || (typeof input !== 'string' ? input.headers : undefined));
        if (!headers.has('x-webly-session')) headers.set('x-webly-session', _sess);
        init.headers = headers;
        return origFetch(newInput, init);
      } catch(_) {
        return origFetch(input, init);
      }
    };
  })();
</script>

<script>
  // ───── In-browser module loader ─────
  const FILES = {"/main.jsx":"import React from \"react\";\nimport { createRoot } from \"react-dom/client\";\nimport { BrowserRouter } from \"react-router-dom\";\nimport App from \"./App\";\n\ncreateRoot(document.getElementById(\"root\")).render(\n  <BrowserRouter>\n    <App />\n  </BrowserRouter>\n);\n","/App.jsx":"import { Routes, Route, Link } from \"react-router-dom\";\n\nfunction Home() {\n  return (\n    <div className=\"min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white grid place-items-center p-8\">\n      <div className=\"text-center max-w-2xl\">\n        <h1 className=\"text-5xl md:text-7xl font-extrabold mb-6 bg-gradient-to-r from-cyan-400 to-fuchsia-400 bg-clip-text text-transparent\">\n          Webly\n        </h1>\n        <p className=\"text-xl text-slate-300 mb-8\">\n          ابدأ المحادثة لبناء تطبيقك Full-Stack\n        </p>\n      </div>\n    </div>\n  );\n}\n\nexport default function App() {\n  return (\n    <Routes>\n      <Route path=\"/\" element={<Home />} />\n    </Routes>\n  );\n}\n"};
  const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;
    }
    return null;
  }

  function resolvePath(from, spec) {
    // External (bare) — handled via importmap
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    const base = from.replace(/[^/]+$/, '');
    const raw = spec.startsWith('/') ? spec : (base + spec);
    const segs = [];
    for (const s of raw.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return tryResolve('/' + segs.join('/'));
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    return Babel.transform(code, {
      presets, plugins: [], filename: path, sourceType: 'module',
    }).code;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) deps.push({ spec, resolved });
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  (async () => {
    try {
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
